name: personal_medicine_reminder
description: "MedCare — your personal medicine reminder, health tracker, and AI wellness assistant."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Core & Utils ---
  uuid: ^4.0.0
  intl: ^0.20.2
  timezone: ^0.10.1
  cupertino_icons: ^1.0.8

  # --- UI & State Management ---
  get: ^4.6.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # --- Firebase ---
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_database: ^12.1.1
  google_sign_in: ^6.2.2

  # --- Local Storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- Notifications ---
  flutter_local_notifications: ^19.5.0
  table_calendar: ^3.2.0
  flutter_timezone: ^5.0.1
  fl_chart: ^1.1.1
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^6.0.0   # Secure API key loading from .env file
  file_picker: ^8.0.0
  open_file: ^3.3.2
  url_launcher: ^6.2.5 # SRS-136
  audioplayers: ^6.1.0 # For notification sound preview
  syncfusion_flutter_pdfviewer: ^33.2.10
  image: ^4.8.0
  firebase_storage: ^13.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code Generation (REQUIRED for Hive) ---
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/sounds/short/
    - assets/sounds/long/